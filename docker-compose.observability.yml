version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.observability.yml
# ─────────────────────────────────────────────────────────────────────────────
# OpenTelemetry + Distributed Tracing stack for the AI Insurance Platform.
#
# ARCHITECTURE OVERVIEW
# ──────────────────────
# Every service (FastAPI, Kafka consumers, RAG pipeline) is instrumented with
# the OpenTelemetry Python SDK. Traces flow:
#
#   FastAPI/Workers  →  OTEL Collector  →  Jaeger (UI + storage)
#                                      →  Prometheus (metrics scrape)
#                                      →  Grafana (dashboards)
#
# WHY OTEL COLLECTOR AS INTERMEDIARY?
# The Collector decouples instrumentation from backends. If we switch from
# Jaeger to Honeycomb or Datadog, we change one Collector exporter config —
# not every service. It also handles batching, retry, and data compression.
#
# TRACE PROPAGATION IN EDA
# Kafka messages carry the W3C trace context in their headers:
#   traceparent: 00-{trace_id}-{span_id}-01
# The Kafka consumer reads this header and continues the distributed trace,
# linking the HTTP request span → Kafka publish span → consumer span → LLM span.
# This gives a complete end-to-end trace for every claim adjudication.
#
# PREREQUISITES
# • Docker Compose v2.x
# • Run alongside the main docker-compose.yml:
#     docker compose -f docker-compose.yml -f docker-compose.observability.yml up
# • Jaeger UI:     http://localhost:16686
# • Grafana:       http://localhost:3001  (admin/admin)
# • Prometheus:    http://localhost:9090
# • OTEL Collector health: http://localhost:13133
# ─────────────────────────────────────────────────────────────────────────────

networks:
  insurance_net:
    external: true   # Shared with main docker-compose.yml

volumes:
  prometheus_data: {}
  grafana_data: {}

services:

  # ── OpenTelemetry Collector ────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./docker/otel/collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC receiver  (services → collector)
      - "4318:4318"     # OTLP HTTP receiver  (services → collector)
      - "8888:8888"     # Collector self-metrics (Prometheus scrape)
      - "13133:13133"   # Health check endpoint
    networks:
      - insurance_net
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Jaeger — Distributed Trace Storage + UI ────────────────────────────────
  # Using the "all-in-one" image for development. Production should use
  # Jaeger with a Cassandra or Elasticsearch backend for long-term storage.
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: "memory"
      # Production: SPAN_STORAGE_TYPE=elasticsearch
      # ES_SERVER_URLS: http://elasticsearch:9200
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC model
      - "14268:14268"   # HTTP collector
    networks:
      - insurance_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus — Metrics Scraping ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - insurance_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Grafana — Dashboards ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:10.4.2
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3001"
      # Pre-provision Prometheus + Jaeger data sources
      GF_DATASOURCES_DEFAULT_URL: http://prometheus:9090
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3001"
    networks:
      - insurance_net
    depends_on:
      - prometheus

  # ── Kafka + Zookeeper (with DLQ topics) ───────────────────────────────────
  # Extended Kafka config with Dead Letter Queue topics pre-created.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - insurance_net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "9092:9092"
    networks:
      - insurance_net

  # ── Kafka Topic Initializer — creates DLQ topics on startup ───────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka_init
    depends_on:
      - kafka
    networks:
      - insurance_net
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Waiting for Kafka...'
      cub kafka-ready -b kafka:9092 1 30
      echo 'Creating topics...'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic claims.validated          --partitions 6 --replication-factor 1 --config retention.ms=604800000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic claims.clinical_review   --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic claims.stp               --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic claims.dead_letter       --partitions 3 --replication-factor 1 --config retention.ms=2592000000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic saga.adjudication.events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic saga.adjudication.dlq    --partitions 3 --replication-factor 1 --config retention.ms=2592000000
      echo 'Topics created.'
      "

  # ── Redis (Semantic Cache) ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - insurance_net
